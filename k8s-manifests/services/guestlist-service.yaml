apiVersion: v1
kind: Service
metadata:
  name: guestlist-service
  namespace: guestlist-dev
  labels:
    app: guestlist
    service: guestlist-service
    environment: dev
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "5"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "30"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "1111"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "http"
spec:
  type: LoadBalancer
  sessionAffinity: None
  externalTrafficPolicy: Cluster
  selector:
    app: guestlist
  ports:
  - name: http
    port: 80
    targetPort: 1111
    protocol: TCP
  - name: direct
    port: 1111
    targetPort: 1111
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: guestlist-service-internal
  namespace: guestlist-dev
  labels:
    app: guestlist
    service: guestlist-service-internal
    environment: dev
  annotations:
    description: "Internal service for cluster communication"
spec:
  type: ClusterIP
  selector:
    app: guestlist
  ports:
  - name: http
    port: 1111
    targetPort: 1111
    protocol: TCP
