apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestlist-deployment
  namespace: guestlist-dev
  labels:
    app: guestlist
    version: v1
    environment: dev
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Guest List API deployment"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: guestlist
  template:
    metadata:
      labels:
        app: guestlist
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "1111"
        prometheus.io/path: "/metrics"
    spec:
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: guestlist
        image: giligalili/guestlistapi:ver01
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 1111
          protocol: TCP
        env:
        - name: PORT
          value: "1111"
        - name: ENVIRONMENT
          value: "dev"
        - name: LOG_LEVEL
          value: "INFO"
        - name: MAX_GUESTS
          value: "1000"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 1111
            httpHeaders:
            - name: Custom-Header
              value: liveness-probe
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 1111
            httpHeaders:
            - name: Custom-Header
              value: readiness-probe
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 1111
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: guestlist-config
          items:
          - key: app.properties
            path: app.properties
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - guestlist
              topologyKey: kubernetes.io/hostname
      tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
