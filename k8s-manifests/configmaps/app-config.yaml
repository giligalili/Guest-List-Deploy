apiVersion: v1
kind: ConfigMap
metadata:
  name: guestlist-config
  namespace: guestlist-dev
  labels:
    app: guestlist
    environment: dev
  annotations:
    description: "Configuration for Guest List application"
data:
  app.properties: |
    # Guest List Application Configuration
    # Environment Settings
    environment=dev
    port=1111
    log_level=INFO
    debug_mode=false
    
    # Application Limits
    max_guests=1000
    max_request_size=1mb
    request_timeout=30s
    
    # Feature Flags
    enable_metrics=true
    enable_health_checks=true
    enable_swagger=true
    
    # Security Settings
    cors_enabled=true
    cors_origins=*
    rate_limit_enabled=true
    rate_limit_requests_per_minute=100
    
    # Logging Configuration
    log_format=json
    log_timestamp=true
    access_log_enabled=true
    
    # Database Configuration (if using persistent storage)
    # database_type=sqlite
    # database_path=/data/guestlist.db
    # connection_pool_size=10
    # connection_timeout=5s
    
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    
    http {
        upstream guestlist_backend {
            server localhost:1111;
        }
        
        server {
            listen 80;
            server_name _;
            
            location /health {
                proxy_pass http://guestlist_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }
            
            location / {
                proxy_pass http://guestlist_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
    
  monitoring.yaml: |
    # Monitoring configuration
    metrics:
      enabled: true
      path: /metrics
      port: 1111
    
    health_checks:
      liveness:
        path: /health
        initial_delay: 30
        period: 10
      readiness:
        path: /ready
        initial_delay: 5
        period: 5
    
    logging:
      level: INFO
      format: json
      structured: true
      
  security.yaml: |
    # Security configuration
    cors:
      enabled: true
      origins: ["*"]
      methods: ["GET", "POST", "DELETE", "OPTIONS"]
      headers: ["Content-Type", "Authorization"]
    
    rate_limiting:
      enabled: true
      requests_per_minute: 100
      burst_size: 50
      
    headers:
      security_headers: true
      content_type_options: true
      frame_options: "DENY"
      xss_protection: true
